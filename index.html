<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Script Architect - Premium Suite</title>
    <!-- Google Fonts for High-End Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #0ea5e9;
            --accent-gradient: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 40px 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .badge {
            background: rgba(14, 165, 233, 0.1);
            color: var(--accent-blue);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 16px;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        select option {
            background: #0f172a;
            color: var(--text-primary);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(14, 165, 233, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <center><div class="badge">Next-Gen AI Engine</div></center>
        <h1 style="text-align: center;">AI Video Script Architect</h1>
        <p class="description" style="text-align: center;">Transform raw concepts into highly optimized, retention-breaking prompts and premium viral hooks instantly.</p>
        
        <form id="architectForm">
            <!-- Input 1: Topic -->
            <div class="form-group">
                <label for="topic">What is your video topic or niche?</label>
                <input type="text" id="topic" placeholder="e.g., 3 Dark psychology tricks, Faceless Wealth" required>
            </div>

            <!-- Input 2: Roles (NEW Feature) -->
            <div class="form-group">
                <label for="role">Select AI Content Architect Role</label>
                <select id="role">
                    <option value="viral-shorts">TikTok & Shorts Growth Specialist</option>
                    <option value="psychology">Neuro-Marketing & Hook Expert</option>
                    <option value="storyteller">Cinematic Storyteller & Scriptwriter</option>
                    <option value="copywriter">High-Conversion Retention Engineer</option>
                </select>
            </div>

            <!-- Input 3: Psychological Tone -->
            <div class="form-group">
                <label for="tone">Select Content Psychological Tone</label>
                <select id="tone">
                    <option value="curiosity">Viral Curiosity Loop (High Retention)</option>
                    <option value="authority">Aggressive Authority & Urgency</option>
                    <option value="story">Emotional Cliffhanger Blueprint</option>
                    <option value="controversial">Controversial Perspective Spark</option>
                </select>
            </div>

            <!-- Submit Button with CPA Link Embedded -->
            <button type="submit" class="submit-btn">Generate Premium Prompts & Hooks</button>
        </form>

        <p class="footer-note">Powered by Advanced Content Psychology AI. Secured & verified.</p>
    </div>

    <script>
        document.getElementById('architectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Your Live CPAGrip Locker URL (Optimized for US Email/Zip Submits)
            const cpaLockerUrl = "https://doctoredits.com/1893125";
            
            // Redirects the international user straight to the CPA Content Locker
            window.location.href = cpaLockerUrl;
        });
    </script>

</body>
</html>
