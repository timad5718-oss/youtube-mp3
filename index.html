<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Prompt & Hook Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #131c2e;
            --bg-input: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --border: #334155;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-input);
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-generate:hover {
            opacity: 0.95;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span class="badge">HeyGen Optimization Engine</span>
        <h1>AI Video Script Architect</h1>
        <p class="subtitle">Transform simple ideas into highly retention-optimized prompts and premium hooks instantly.</p>
    </div>

    <div class="form-group">
        <label for="videoTopic">What is your video topic or niche?</label>
        <input type="text" id="videoTopic" placeholder="e.g., 3 Dark psychology tricks to spot a liar...">
    </div>

    <div class="form-group">
        <label for="audienceTone">Select Content Psychological Tone</label>
        <select id="audienceTone">
            <option value="Viral Curiosity Loop">Viral Curiosity Loop (High Retention)</option>
            <option value="Authority & Deep Educational">Authority & Deep Educational</option>
            <option value="Extreme Urgency & Alert">Extreme Urgency & Alert</option>
        </select>
    </div>

    <button class="btn-generate" onclick="processArchitecture()">
        Generate Premium Prompts & Hooks
    </button>

    <div class="footer-note">
        Powered by Advanced Content Psychology AI. Secured & verified.
    </div>
</div>

<script>
function processArchitecture() {
    var topic = document.getElementById('videoTopic').value;
    if(topic.trim() === "") {
        alert("Please provide a valid video topic or theme first.");
        return;
    }
    
    // حفظ المدخلات بشكل احترافي في ذاكرة المتصفح
    localStorage.setItem('savedTopic', topic);
    localStorage.setItem('savedTone', document.getElementById('audienceTone').value);
    
    // إشعار احترافي يظهر للأجنبي قبل الانتقال لقفل CPA
    alert("Analyzing niche retention algorithms... Click OK to unlock your tailored script assets.");
    
    // سأقوم باستبدال السطر التالي برابط إعلانك فور أن ترسل الرابط لي
    // window.location.href = "YOUR_CPA_LOCKER_URL_HERE";
}
</script>

</body>
</html>
